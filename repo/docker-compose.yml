services:
  tests:
    build:
      context: .
      dockerfile: tests/Dockerfile
    container_name: citybus-tests
    restart: "no"

  postgres:
    image: postgres:16
    container_name: citybus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-citybus}
      POSTGRES_USER: ${POSTGRES_USER:-citybus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-citybus}
    ports:
      - "${POSTGRES_HOST_PORT:-55432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-citybus} -d ${POSTGRES_DB:-citybus}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: citybus-backend
    restart: unless-stopped
    depends_on:
      tests:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-citybus}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-citybus}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-citybus}
      SPRING_DATASOURCE_HIKARI_INITIALIZATION_FAIL_TIMEOUT: ${SPRING_DATASOURCE_HIKARI_INITIALIZATION_FAIL_TIMEOUT:-60000}
      SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT: ${SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT:-30000}
      SPRING_DATASOURCE_HIKARI_VALIDATION_TIMEOUT: ${SPRING_DATASOURCE_HIKARI_VALIDATION_TIMEOUT:-5000}
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: ${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:-20}
      SECURITY_JWT_SECRET: ${SECURITY_JWT_SECRET:-change-this-secret-key-to-at-least-32-characters}
      SECURITY_JWT_EXPIRATION_MS: ${SECURITY_JWT_EXPIRATION_MS:-3600000}
      SERVER_PORT: ${SERVER_PORT:-8080}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 15s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: citybus-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"

volumes:
  postgres_data:
